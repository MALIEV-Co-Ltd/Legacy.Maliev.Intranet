apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: legacy-maliev-intranet
  namespace: maliev-legacy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: legacy-maliev-intranet
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: maliev-legacy
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: maliev-legacy
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

